name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: uv sync --dev

      - name: Unit tests
        run: uv run pytest -m "not integration" -v

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: uv sync --dev

      - name: Live verify
        run: uv run python main.py verify --output-dir data/ci_verify

      - name: Integration pytest
        run: uv run pytest -m integration -v
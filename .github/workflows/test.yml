name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: uv sync --dev

      - name: Unit tests (all)
        run: uv run pytest -m "not integration" -v

      - name: Translate pipeline tests (mock, no API key)
        run: |
          uv run pytest tests/test_translate.py tests/test_translate_log.py \
            tests/test_verify_translate.py tests/test_dashboard.py -v

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: uv sync --dev

      - name: Live verify (translate_api skipped without key)
        run: uv run python main.py verify --output-dir data/ci_verify

      - name: Build metrics dashboard
        run: uv run python main.py dashboard --output-dir data/ci_verify

      - name: Integration pytest
        run: uv run pytest -m integration -v

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-dashboard
          path: data/ci_verify/dashboard.json
          if-no-files-found: warn